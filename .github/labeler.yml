# Label PRs based on files changed

ui:
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**/*"
          - "src/app/**/*.tsx"

styles:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.css"
          - "tailwind.config.*"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**/*"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "*.config.*"
          - "*.json"
          - ".github/**/*"

ai:
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/ai/**/*"
          - "scripts/ai-*"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "pnpm-lock.yaml"
